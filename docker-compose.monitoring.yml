services:
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  node_exporter:
    image: prom/node-exporter:latest
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro

  blackbox:
    image: prom/blackbox-exporter:latest
    command:
      - "--config.file=/etc/blackbox/blackbox.yml"
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis_exporter:
    image: oliver006/redis_exporter:latest
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis://host.docker.internal:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mysql_exporter:
    image: prom/mysqld-exporter:latest
    environment:
      DATA_SOURCE_NAME: ${MYSQL_EXPORTER_DSN:-}
    entrypoint:
      - /bin/sh
      - -lc
      - |
        set -e
        if [ -z "$${DATA_SOURCE_NAME:-}" ]; then
          echo "DATA_SOURCE_NAME is empty" >&2
          exit 1
        fi
        dsn="$${DATA_SOURCE_NAME}"
        user="$${dsn%%:*}"
        rest="$${dsn#*:}"
        pass="$${rest%%@*}"
        hostport="$${rest#*@}"
        hostport="$${hostport#(}"
        hostport="$${hostport%)/}"
        host="$${hostport%%:*}"
        port="$${hostport##*:}"
        mkdir -p /tmp/mysqld_exporter
        cat > /tmp/mysqld_exporter/.my.cnf <<EOF
        [client]
        user=$${user}
        password=$${pass}
        host=$${host}
        port=$${port}
        EOF
        chmod 600 /tmp/mysqld_exporter/.my.cnf
        exec /bin/mysqld_exporter --config.my-cnf=/tmp/mysqld_exporter/.my.cnf
    network_mode: host
    profiles:
      - mysql

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_EXPORTER_DSN:-}
    profiles:
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/config.yml:ro
    ports:
      - "127.0.0.1:3100:3100"

  promtail:
    image: grafana/promtail:latest
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/django:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus_data:
  grafana_data:
