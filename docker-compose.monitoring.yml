services:
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.external-url=https://desktop-scbdcpm.tail4a3842.ts.net/prometheus"
      - "--web.route-prefix=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=2GB"
      - "--storage.tsdb.wal-compression"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  node_exporter:
    image: prom/node-exporter:latest
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro

  blackbox:
    image: prom/blackbox-exporter:latest
    command:
      - "--config.file=/etc/blackbox/blackbox.yml"
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis_exporter:
    image: oliver006/redis_exporter:latest
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis://redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  mysql_exporter:
    image: prom/mysqld-exporter:latest
    environment:
      DATA_SOURCE_NAME: ${MYSQL_EXPORTER_DSN:-}
    entrypoint:
      - /bin/sh
      - -lc
      - |
        set -e
        if [ -z "$${DATA_SOURCE_NAME:-}" ]; then
          echo "DATA_SOURCE_NAME is empty" >&2
          exit 1
        fi
        dsn="$${DATA_SOURCE_NAME}"
        user="$${dsn%%:*}"
        rest="$${dsn#*:}"
        pass="$${rest%%@*}"
        hostport="$${rest#*@}"
        hostport="$${hostport#(}"
        hostport="$${hostport%)/}"
        host="$${hostport%%:*}"
        port="$${hostport##*:}"
        mkdir -p /tmp/mysqld_exporter
        cat > /tmp/mysqld_exporter/.my.cnf <<EOF
        [client]
        user=$${user}
        password=$${pass}
        host=$${host}
        port=$${port}
        EOF
        chmod 600 /tmp/mysqld_exporter/.my.cnf
        exec /bin/mysqld_exporter --config.my-cnf=/tmp/mysqld_exporter/.my.cnf
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_EXPORTER_DSN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/config.yml:ro
    ports:
      - "127.0.0.1:3100:3100"

  promtail:
    image: grafana/promtail:latest
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/django:ro
      - /var/www/html/nextcloud/data/nextcloud.log:/var/log/nextcloud/nextcloud.log:ro
    depends_on:
      - loki

  redis:
    image: redis:8
    command:
      - redis-server
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--save"
      - ""
      - "--appendonly"
      - "no"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data


  grafana:
    image: grafana/grafana-oss:10.4.3
    ports:
      - "3001:3000"
    environment:
      - GF_PLUGINS_PREINSTALL_DISABLED=true
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=https://desktop-scbdcpm.tail4a3842.ts.net/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"database\"[[:space:]]*:[[:space:]]*\"ok\"'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus_data:
  grafana_data:
  redis_data:
