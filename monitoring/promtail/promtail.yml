server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: django
    static_configs:
      - targets: [localhost]
        labels:
          job: django
          __path__: /var/log/django/django.log
  - job_name: nextcloud
    static_configs:
      - targets: [localhost]
        labels:
          job: nextcloud
          __path__: /var/log/nextcloud/nextcloud.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            app: app
            user: user
            method: method
            url: url
            reqId: reqId
      - labels:
          app:
          level:
