groups:
  - name: targets
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Target down ({{ $labels.job }})"
          description: "Prometheus cannot scrape {{ $labels.instance }} for job {{ $labels.job }} for 5m."

      - alert: BlackboxProbeFailed
        expr: probe_success == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Blackbox probe failed ({{ $labels.instance }})"
          description: "Blackbox probe failed for {{ $labels.instance }} for 5m."

  - name: http
    rules:
      - alert: DjangoHttp5xxRateHigh
        expr: |
          (
            sum(rate(django_http_responses_total_by_status_total{job="django",status=~"5.."}[5m]))
            /
            sum(rate(django_http_responses_total_by_status_total{job="django"}[5m]))
          ) > 0.05
          and
          sum(rate(django_http_responses_total_by_status_total{job="django"}[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Django 5xx rate high"
          description: "5xx response rate > 5% for 10m."

      - alert: DjangoP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(django_http_requests_latency_seconds_by_view_method_bucket{job="django"}[5m])
            )
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Django p95 latency high"
          description: "p95 latency > 1s for 10m (all views)."

  - name: infra
    rules:
      - alert: DiskSpaceLow
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay",mountpoint=~"/var/lib/mysql|/var/lib/postgresql|/var/www/html/nextcloud/data"}
            /
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay",mountpoint=~"/var/lib/mysql|/var/lib/postgresql|/var/www/html/nextcloud/data"}
          ) < 0.15
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low"
          description: "Filesystem has < 15% free space on {{ $labels.mountpoint }}."

      - alert: DiskSpaceCritical
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay",mountpoint=~"/var/lib/mysql|/var/lib/postgresql|/var/www/html/nextcloud/data"}
            /
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay",mountpoint=~"/var/lib/mysql|/var/lib/postgresql|/var/www/html/nextcloud/data"}
          ) < 0.05
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critical"
          description: "Filesystem has < 5% free space on {{ $labels.mountpoint }}."

      - alert: DbExporterDown
        expr: up{job=~"mysql_exporter|postgres_exporter"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "DB exporter down ({{ $labels.job }})"
          description: "DB exporter {{ $labels.job }} is down for {{ $labels.instance }}."

      - alert: MySqlConnectionsNearLimit
        expr: |
          mysql_global_status_threads_connected
          /
          mysql_global_variables_max_connections
          > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "MySQL connections near limit"
          description: "MySQL connections > 90% of max."

      - alert: PostgresConnectionsNearLimit
        expr: |
          sum by (instance) (pg_stat_activity_count)
          /
          max by (instance) (pg_settings_max_connections)
          > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Postgres connections near limit"
          description: "Postgres connections > 90% of max."

      - alert: RedisDown
        expr: up{job="redis_exporter"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Redis exporter down"
          description: "Redis exporter is down for {{ $labels.instance }}."

      - alert: RedisMemoryHigh
        expr: |
          redis_memory_used_bytes
          /
          redis_memory_max_bytes
          > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage > 90% for {{ $labels.instance }}."

  - name: ndvi
    rules:
      - alert: NdviJobFailuresHigh
        expr: |
          sum by (engine, type) (
            increase(ndvi_jobs_total{status="FAILED"}[15m])
          ) > 5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "NDVI job failures high"
          description: "NDVI job failures > 5 in 15m for engine={{ $labels.engine }} type={{ $labels.type }}."

      - alert: NdviNoSuccessfulJobsRecently
        expr: |
          sum(increase(ndvi_jobs_total{status="SUCCESS"}[6h])) < 1
        for: 6h
        labels:
          severity: warning
        annotations:
          summary: "No successful NDVI jobs recently"
          description: "No successful NDVI jobs in the last 6h (enable only if periodic jobs are expected)."

      - alert: NdviStreamLagHigh
        expr: |
          sum by (group) (redis_stream_pending_entries) > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "NDVI stream lag high"
          description: "NDVI stream '{{ $labels.group }}' has > 100 pending entries for 10m."

      - alert: NdviStreamOldMessage
        expr: |
          max by (group) (redis_stream_pending_age_max) > 3600
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "NDVI stream old message"
          description: "Oldest message in NDVI stream '{{ $labels.group }}' is > 1h old."

      - alert: NdviStreamConsumerDown
        expr: |
          (time() - ndvi_stream_consumer_heartbeat) > 600
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "NDVI stream consumer down"
          description: "NDVI stream consumer '{{ $labels.consumer }}' has not sent a heartbeat for 10m."

      - alert: NdviStreamConsumerFailuresHigh
        expr: |
          sum by (consumer, failure_type) (rate(ndvi_stream_consumer_failures_total[10m])) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "NDVI stream consumer failures high"
          description: "NDVI stream consumer '{{ $labels.consumer }}' is failing ({{ $labels.failure_type }}) > 0.1/s for 10m."

  - name: weather
    rules:
      - alert: WeatherProviderErrorRateHigh
        expr: |
          (
            sum by (provider) (rate(weather_provider_errors_total[10m]))
            /
            sum by (provider) (rate(weather_provider_requests_total[10m]))
          ) > 0.2
          and
          sum by (provider) (rate(weather_provider_requests_total[10m])) > 0.1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Weather provider error rate high"
          description: "Weather provider error rate > 20% for provider={{ $labels.provider }}."

  - name: celery
    rules:
      - alert: CeleryTaskFailuresHigh
        expr: |
          sum by (task) (rate(celery_tasks_total{event="failed"}[10m]))
          > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Celery task failures high"
          description: "Celery task {{ $labels.task }} is failing more than 1/s for 10m."

      - alert: CeleryTaskRuntimeHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (task, le) (
              rate(celery_task_runtime_seconds_bucket[5m])
            )
          ) > 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Celery task runtime high"
          description: "p95 runtime for {{ $labels.task }} > 30s for 10m."

      - alert: CeleryBacklogHigh
        expr: sum(celery_tasks_in_progress) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Celery backlog high"
          description: "More than 10 Celery tasks are in-progress."

  - name: system
    rules:
      - alert: MemoryUsageHigh
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage high"
          description: "System memory usage > 85% for 10m."

      - alert: MemoryUsageCritical
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Memory usage critical"
          description: "System memory usage > 95% for 5m. OOM killer may activate."

      - alert: DiskSpaceLowRoot
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Root disk space low"
          description: "Root filesystem < 15% free on {{ $labels.instance }}."

      - alert: SwapUsageHigh
        expr: |
          (node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes) / node_memory_SwapTotal_bytes > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Swap usage high"
          description: "Swap usage > 50% on {{ $labels.instance }}."

  - name: nextcloud
    rules:
      - alert: NextcloudLogFileLarge
        expr: |
          (node_filesystem_size_bytes{mountpoint="/var/www/html/nextcloud/data"} -
           node_filesystem_avail_bytes{mountpoint="/var/www/html/nextcloud/data"}) > 500 * 1024 * 1024
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Nextcloud data partition large"
          description: "Nextcloud data partition > 500MB used. Check log rotation."

      - alert: NextcloudHighRequestRate
        expr: |
          rate(http_request_duration_seconds_count{job="nextcloud"}[5m]) > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Nextcloud request rate high"
          description: "Nextcloud receiving > 50 req/s for 10m."

  - name: redis
    rules:
      - alert: RedisMemoryNearLimit
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory near limit"
          description: "Redis using > 85% of maxmemory limit."

      - alert: RedisEvictionStarted
        expr: |
          rate(redis_evicted_keys_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis evicting keys"
          description: "Redis is evicting keys due to maxmemory limit."
