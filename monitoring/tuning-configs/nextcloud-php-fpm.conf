; Nextcloud PHP-FPM Pool Configuration
; Install to: /etc/php/8.x/fpm/pool.d/nextcloud.conf
; Adjust PHP version path as needed (8.1, 8.2, etc.)

[nextcloud]
user = www-data
group = www-data

; Listen on socket (recommended for performance)
listen = /run/php/php8.1-fpm-nextcloud.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Process management - Dynamic (balances performance vs memory)
pm = dynamic
pm.max_children = 15              ; Maximum number of child processes (prevents OOM)
pm.start_servers = 3              ; Initial number of processes
pm.min_spare_servers = 2          ; Minimum idle processes
pm.max_spare_servers = 5          ; Maximum idle processes
pm.max_requests = 500             ; Restart worker after 500 requests (prevents memory leaks)

; Memory limits
php_admin_value[memory_limit] = 512M        ; Max memory per request
php_admin_value[max_execution_time] = 120   ; Max execution time in seconds
php_admin_value[max_input_time] = 60        ; Max time to parse input
php_admin_value[upload_max_filesize] = 512M ; Max upload size
php_admin_value[post_max_size] = 512M       ; Max POST size

; OPcache settings (reduces CPU/memory usage)
php_admin_value[opcache.enable] = 1
php_admin_value[opcache.memory_consumption] = 256
php_admin_value[opcache.max_accelerated_files] = 10000
php_admin_value[opcache.revalidate_freq] = 60
php_admin_value[opcache.validate_timestamps] = 1
php_admin_value[opcache.interned_strings_buffer] = 16

; Session handling
php_admin_value[session.save_handler] = redis
php_admin_value[session.save_path] = "tcp://127.0.0.1:6379"

; Logging
php_admin_value[error_log] = /var/log/php8.1-fpm/nextcloud-error.log
php_admin_flag[log_errors] = on
php_admin_value[log_level] = warning

; Security
php_admin_value[expose_php] = off
php_admin_value[allow_url_fopen] = off
php_admin_value[disable_functions] = exec,passthru,shell_exec,system
