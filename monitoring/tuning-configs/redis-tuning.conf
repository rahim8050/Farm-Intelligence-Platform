# Redis Performance & Memory Configuration
# Install to: /etc/redis/redis.conf (append to existing)
# Or use in Docker: mount as volume

# ============================
# Memory Limits
# ============================

# Max memory (keep at 25-30% of available RAM)
# For 4GB RAM server: 1GB
# For 8GB RAM server: 2GB
maxmemory 512mb

# Eviction policy - remove least recently used keys when limit reached
maxmemory-policy allkeys-lru

# Memory sampling for LRU (higher = more accurate, slower)
maxmemory-samples 10

# ============================
# Disable Persistence (if using as cache/broker only)
# ============================

# Disable RDB snapshots
save ""

# Disable AOF (append-only file)
appendonly no

# Note: If you need persistence for Celery result backend, enable AOF:
# appendonly yes
# appendfsync everysec
# auto-aof-rewrite-percentage 100
# auto-aof-rewrite-min-size 64mb

# ============================
# Network
# ============================

# Bind to localhost only (security)
bind 127.0.0.1 ::1

# Default port
port 6379

# TCP backlog
tcp-backlog 511

# Timeout (close idle connections after 300s)
timeout 300

# TCP keepalive
tcp-keepalive 60

# ============================
# Performance
# ============================

# Disable THP (Transparent Huge Pages) warning
# Run: echo never > /sys/kernel/mm/transparent_hugepage/enabled

# Max clients
maxclients 10000

# Slow log (log queries > 10ms)
slowlog-log-slower-than 10000
slowlog-max-len 128

# ============================
# Logging
# ============================

loglevel notice
logfile /var/log/redis/redis-server.log

# ============================
# Security
# ============================

# Rename dangerous commands (optional)
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""

# Protected mode (yes = require password or bind to localhost)
protected-mode yes

# Require password (uncomment and set strong password)
# requirepass YourStrongPasswordHere123!

# ============================
# Lazy Freeing (non-blocking deletes)
# ============================

lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes
