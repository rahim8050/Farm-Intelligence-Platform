services:
  db:
    image: mysql:8.0
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-weather_apis}
      MYSQL_USER: ${MYSQL_USER:-weather}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-weather}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:8
    command:
      - redis-server
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis_data:/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -lc "python manage.py migrate --noinput"
    environment:
      DJANGO_ENV: ${DJANGO_ENV:-development}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DJANGO_API_KEY_PEPPER: ${DJANGO_API_KEY_PEPPER:-dev-pepper}
      DATABASE_URL: ${DATABASE_URL:-mysql://weather:weather@db:3306/weather_apis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      FRONTEND_RESET_URL: ${FRONTEND_RESET_URL:-http://localhost:3000/reset-password}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@example.com}
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -lc "exec python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_ENV: ${DJANGO_ENV:-development}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DJANGO_API_KEY_PEPPER: ${DJANGO_API_KEY_PEPPER:-dev-pepper}
      DATABASE_URL: ${DATABASE_URL:-mysql://weather:weather@db:3306/weather_apis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      FRONTEND_RESET_URL: ${FRONTEND_RESET_URL:-http://localhost:3000/reset-password}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@example.com}
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import httpx; raise SystemExit(0 if httpx.get('http://127.0.0.1:8000/').status_code == 200 else 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    profiles:
      - worker
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -lc "exec celery -A config worker -l info"
    environment:
      DJANGO_ENV: ${DJANGO_ENV:-development}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DJANGO_API_KEY_PEPPER: ${DJANGO_API_KEY_PEPPER:-dev-pepper}
      DATABASE_URL: ${DATABASE_URL:-mysql://weather:weather@db:3306/weather_apis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  beat:
    profiles:
      - beat
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -lc "exec celery -A config beat -l info"
    environment:
      DJANGO_ENV: ${DJANGO_ENV:-development}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DJANGO_API_KEY_PEPPER: ${DJANGO_API_KEY_PEPPER:-dev-pepper}
      DATABASE_URL: ${DATABASE_URL:-mysql://weather:weather@db:3306/weather_apis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  mysql_data:
  redis_data:
