# Sentinel-1 Soil Moisture Index (S1-SMI) Calibration Coefficients
#
# Formula: SMI = alpha * VV_dB + beta * VH_dB + gamma
#
# These are site-specific empirical coefficients. Defaults below are
# starting values for tropical agricultural soils (clay-loam, moderate
# vegetation cover). Tune per region/crop using ground-truth data.

s1_smi_coefficients:
  maize:
    sandy_clay_loam:
      ascending:  { alpha: 0.72, beta: -0.28, gamma: 0.45 }
      descending: { alpha: 0.68, beta: -0.32, gamma: 0.52 }
  default:
    ascending:  { alpha: 0.70, beta: -0.30, gamma: 0.50 }
    descending: { alpha: 0.70, beta: -0.30, gamma: 0.50 }
